name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  schema-validate:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install jsonschema

      - name: Validate schema contracts
        run: python tools/validate_schemas.py

  gpio-check:
    name: GPIO static check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run GPIO checker
        run: python tools/check_gpio.py

  python-unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install jsonschema httpx

      - name: Run Python unit tests
        run: |
          python tools/test_check_gpio.py -v
          python -m unittest tools.tests.test_check_gpio -v
          python -m unittest discover -s tests -p "test_*.py" -v

  firmware-native-tests:
    name: U1 firmware native tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile and run JSON parser tests
        run: |
          g++ -std=c++17 -I firmware/u1-grbl/Grbl_Esp32/src \
            firmware/u1-grbl/test/test_json_parser.cpp \
            firmware/u1-grbl/Grbl_Esp32/src/json_utils.cpp \
            -o /tmp/test_json_parser && /tmp/test_json_parser

      - name: Verify no E009 regression in Protocol.cpp
        run: |
          if grep -n '"E009"' firmware/u1-grbl/Grbl_Esp32/src/Protocol.cpp; then
            echo "ERROR: E009 found in Protocol.cpp — use specific error codes (E001-E008)"
            exit 1
          fi
          echo "OK: No E009 in Protocol.cpp"

  fake-integration:
    name: Fake U1 integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install jsonschema

      - name: Run fake tool tests
        run: |
          python tools/fake_u1/test_fake_u1.py -v
          python -m unittest tools.fake_u1.tests.test_app -v
          python -m unittest tools.fake_device_server.tests.test_app -v
          python -m unittest tools.fake_ai.tests.test_app -v
          python -m unittest tests.ci.test_fake_integration -v

  manager-api-tests:
    name: Manager API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/xiaozhi-esp32-server/main/manager-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run App V2 tests
        run: mvn "-Dtest=AESUtilsTest,RenExceptionHandlerTest,SafetyValidatorTest,SafetyAuditServiceTest,ContentAuditServiceTest,ContentAuditLogServiceTest,SingleLineSvgValidatorTest,WriteTextProjectionServiceTest,DrawGeneratedProjectionServiceTest,FactoryEntitlementServiceTest,ResourceEntitlementServiceTest,FirmwareReleaseServiceTest,FirmwareReleaseControllerTest,MemberServiceImplTest,VoiceprintEnrollmentServiceImplTest,PrivacyDeletionServiceImplTest,DeviceSupplyServiceImplTest,PrimarySessionServiceImplTest,DeviceTransferServiceImplTest,DeviceRmaServiceImplTest,ProductNotificationOutboxServiceImplTest,MonitoringMetricsServiceImplTest,MonitoringMetricsControllerTest,AppV2ServiceImplTest,AppV2ControllerTest,InternalMotionEventControllerTest,ConfigControllerTest,DeviceServerMotionGatewayImplTest,EdgeAClientHubTest,ClientEdgeWebSocketHandlerTest" test

  manager-mobile-tests:
    name: Manager mobile tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/xiaozhi-esp32-server/main/manager-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Type check
        run: corepack pnpm run type-check

      - name: Build WeChat mini program
        run: corepack pnpm run build:mp-weixin

      - name: Verify WeChat permission artifact
        run: |
          node -e "const fs = require('node:fs'); const app = JSON.parse(fs.readFileSync('dist/build/mp-weixin/app.json', 'utf8')); const permission = app.permission || {}; if (!permission['scope.record']) throw new Error('missing scope.record'); if (!permission['scope.userLocation']) throw new Error('missing scope.userLocation'); if (!(app.requiredPrivateInfos || []).includes('getLocation')) throw new Error('missing getLocation private info');"

  firmware-u1-build:
    name: U1 firmware build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/u1-grbl/platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build U1 firmware
        working-directory: firmware/u1-grbl
        run: pio run

  firmware-u8-build:
    name: U8 firmware build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.2
          path: firmware/u8-xiaozhi
          target: esp32s3

  markdown-link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/markdown-link-check-config.json"
