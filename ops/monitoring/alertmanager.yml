route:
  receiver: ops-webhook
  group_by:
    - alertname
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: ops-webhook
    webhook_configs:
      - url: ${DINGTALK_WEBHOOK_URL}
        send_resolved: true
      - url: ${WECHAT_WEBHOOK_URL}
        send_resolved: true
